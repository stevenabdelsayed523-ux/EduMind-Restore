kind = "web"
previewPath = "/"
title = "EduMind"
version = "1.0.0"
id = "artifacts/edumind"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25722

[services.development]
run = "pnpm --filter @workspace/edumind run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/edumind", "run", "build" ]
publicDir = "artifacts/edumind/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25722"
BASE_PATH = "/"
